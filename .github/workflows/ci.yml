name: CI Pipeline — Sistem Antrian Puskesmas

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  PHP_VERSION: '8.1'

jobs:
  # ==========================================
  # JOB 1: BUILD & UNIT TEST
  # ==========================================
  unit-test:
    name: 🔬 Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, mysqli, pdo_mysql
          coverage: none

      - name: 📦 Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: ✅ Jalankan Unit Tests
        run: vendor/bin/phpunit tests/unit/ --colors=always --testdox

  # ==========================================
  # JOB 2: INTEGRATION TEST (dengan MySQL)
  # ==========================================
  integration-test:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: uas_puskesmas
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, mysqli, pdo_mysql

      - name: 📦 Install Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: 🗄️ Setup database schema & seed
        run: |
          mysql -h 127.0.0.1 -u root uas_puskesmas < database/schema.sql
          mysql -h 127.0.0.1 -u root uas_puskesmas < database/seed.sql

      - name: 🔗 Jalankan Integration Tests
        run: vendor/bin/phpunit tests/integration/ --colors=always --testdox
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASS: ''
          DB_NAME: uas_puskesmas

  # ==========================================
  # JOB 3: CODE QUALITY CHECK
  # ==========================================
  code-quality:
    name: 📏 Code Quality
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: php-cs-fixer

      - name: 🔍 Cek PHP Syntax (Lint)
        run: find . -name "*.php" -not -path "*/vendor/*" | xargs -I {} php -l {}

  # ==========================================
  # JOB 4: DEPLOY (hanya jika semua test pass)
  # ==========================================
  deploy:
    name: 🚀 Deploy ke Production
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, code-quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: 🚀 Deploy ke Railway
        run: |
          echo "✅ Semua tes berhasil!"
          echo "🚀 Deployment ke Railway/server production..."
          echo "📋 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
          # Uncomment dan isi sesuai platform deployment:
          # curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}"

      - name: ✅ Deploy berhasil
        run: |
          echo "🎉 Aplikasi Sistem Antrian Puskesmas berhasil di-deploy!"
          echo "🌐 URL: https://your-app.railway.app"
